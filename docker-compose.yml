services:
  devdocs_backend:
    build: ./backend
    container_name: devdocs_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    container_name: devdocs_db
    environment:
      # Docker loads variables from .env automatically
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Bridge for DB
      # /docker-entrypoint-initdb.d everything in this location will be initiated during container start
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Creating DB for test purposes
    # Container is healthy if command returns 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]   # CMD-SHELL needs one argument after itself
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # Save downloaded models during restart
    post_start:
      - command: /bin/sh -c "ollama pull nomic-embed-text-v2-moe:latest && ollama pull llama3.2:latest"
    healthcheck:
      test: ["CMD-SHELL", "ollama list"] # Wykorzystuje natywną komendę Ollamy do sprawdzenia responsywności serwera
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:  # Bridge to save all models during container restart